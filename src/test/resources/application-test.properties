# ====================================
# TEST Profile Configuration
# ====================================
spring.application.name=DOSW-Library-Test

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Database - H2 En Memoria
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# H2 Console para debugging (opcional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security JWT
security.jwt.secret=VGhpc0lzQVN0cm9uZ0pXVFNlY3JldEtleUZvckRPU1dfTGlicmFyeV8yMDI2X1Bhc3NfQ2hhbmdlTWVQbGVhc2U=
security.jwt.expiration-ms=3600000
security.auth.username=admin
security.auth.password=admin1234

# Logging
logging.level.root=WARN
logging.level.edu.eci.dosw.DOSW_Library=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO

